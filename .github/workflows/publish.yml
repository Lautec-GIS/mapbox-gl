name: Publish to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.16)"
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@lautec-gis"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build-prod-min && npm run build-css && npm run build-dts

      - name: Set version
        if: ${{ github.event.inputs.version != '' }}
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
